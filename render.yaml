services:
  - type: web
    name: bloxhop-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: NODE_ENV=development npx --yes pnpm@9 install --no-frozen-lockfile && npx --yes pnpm@9 --filter @workspace/api-server run build && npx --yes pnpm@9 --filter @workspace/db run push-force
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: bloxhop-db
          property: connectionString
      - key: ROBLOX_COOKIE
        sync: false
      - key: SESSION_SECRET
        sync: false

databases:
  - name: bloxhop-db
    plan: free
    region: singapore
